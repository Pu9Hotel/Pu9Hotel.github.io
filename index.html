<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hotel System Offline PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f1f5f9;
font-family:system-ui;
}

.header{
background:#111827;
color:white;
padding:14px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.room{
padding:16px;
border-radius:12px;
text-align:center;
color:white;
font-weight:bold;
cursor:pointer;
}

.available{background:#22c55e}
.occupied{background:#ef4444}
.reserved{background:#f59e0b}
.cleaning{background:#6b7280}

</style>
</head>

<body>

<div class="header">🏨 Hotel System Offline</div>

<div class="container mt-3">

<div class="row text-center">

<div class="col">
<h6>ว่าง</h6>
<h4 id="free">0</h4>
</div>

<div class="col">
<h6>เข้าพัก</h6>
<h4 id="used">0</h4>
</div>

<div class="col">
<h6>จอง</h6>
<h4 id="reservedCount">0</h4>
</div>

</div>

<div class="row text-center mt-3">

<div class="col">
<h6>รายได้วันนี้</h6>
<h4 id="incomeToday">0</h4>
</div>

<div class="col">
<h6>รายได้เดือนนี้</h6>
<h4 id="incomeMonth">0</h4>
</div>

</div>

<h5 class="mt-4">Room Map</h5>

<div class="row g-2" id="rooms"></div>

</div>


<div class="modal fade" id="roomModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 id="roomTitle"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input class="form-control mb-2" id="name" placeholder="ชื่อลูกค้า">

<input class="form-control mb-2" id="phone" placeholder="เบอร์โทร">

<input class="form-control mb-2" id="price" value="500">

<label>วันที่เข้า</label>
<input class="form-control mb-2" type="date" id="checkin">

<label>วันที่ออก</label>
<input class="form-control mb-2" type="date" id="checkout">

<div class="alert alert-info text-center" id="stayInfo">
0 คืน | 0 บาท
</div>

<button class="btn btn-success w-100 mb-2" onclick="checkinRoom()">Check-in</button>

<button class="btn btn-warning w-100 mb-2" onclick="reserveRoom()">จอง</button>

<button class="btn btn-danger w-100 mb-2" onclick="checkoutRoom()">Check-out</button>

<button class="btn btn-secondary w-100" onclick="cleanDone()">ทำความสะอาดเสร็จ</button>

</div>

</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || {}
let income = JSON.parse(localStorage.getItem("income")) || {}

let currentRoom = null
let modal = new bootstrap.Modal(document.getElementById("roomModal"))

function save(){
localStorage.setItem("rooms",JSON.stringify(rooms))
localStorage.setItem("income",JSON.stringify(income))
}

function loadRooms(){

let free=0
let used=0
let reserved=0
let html=""

for(let i=101;i<=150;i++){

let r=rooms[i]
let status="available"

if(r){

if(r.status==="occupied"){status="occupied";used++}
else if(r.status==="reserved"){status="reserved";reserved++}
else if(r.status==="cleaning"){status="cleaning"}
else free++

}else{
free++
}

html+=`
<div class="col-3">
<div class="room ${status}" onclick="openRoom(${i})">
${i}
</div>
</div>
`

}

document.getElementById("rooms").innerHTML=html
document.getElementById("free").innerText=free
document.getElementById("used").innerText=used
document.getElementById("reservedCount").innerText=reserved

}

function openRoom(room){

currentRoom=room
document.getElementById("roomTitle").innerText="ห้อง "+room

let r=rooms[room]

if(r){

document.getElementById("name").value=r.name||""
document.getElementById("phone").value=r.phone||""
document.getElementById("price").value=r.price||500
document.getElementById("checkin").value=r.checkin||""
document.getElementById("checkout").value=r.checkout||""

}else{

document.getElementById("name").value=""
document.getElementById("phone").value=""
document.getElementById("price").value=500

let today=new Date().toISOString().slice(0,10)

document.getElementById("checkin").value=today
document.getElementById("checkout").value=""

}

calcStay()
modal.show()

}

function calcStay(){

let checkin=document.getElementById("checkin").value
let checkout=document.getElementById("checkout").value
let price=Number(document.getElementById("price").value)

let nights=0

if(checkin && checkout){

nights=(new Date(checkout)-new Date(checkin))/(1000*60*60*24)

if(nights<=0){
nights=1
}

}

let total=nights*price

document.getElementById("stayInfo").innerText=nights+" คืน | "+total+" บาท"

}

document.getElementById("checkin").addEventListener("change",calcStay)
document.getElementById("checkout").addEventListener("change",calcStay)
document.getElementById("price").addEventListener("change",calcStay)

function checkinRoom(){

rooms[currentRoom]={
status:"occupied",
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
price:Number(document.getElementById("price").value),
checkin:document.getElementById("checkin").value,
checkout:document.getElementById("checkout").value
}

save()
loadRooms()
modal.hide()

}

function reserveRoom(){

rooms[currentRoom]={
status:"reserved",
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
price:Number(document.getElementById("price").value),
checkin:document.getElementById("checkin").value,
checkout:document.getElementById("checkout").value
}

save()
loadRooms()
modal.hide()

}

function checkoutRoom(){

let r=rooms[currentRoom]

if(!r)return

let nights=(new Date(r.checkout)-new Date(r.checkin))/(1000*60*60*24)

if(nights<=0){
nights=1
}

let total=r.price*nights

let today=new Date().toISOString().slice(0,10)
let month=today.slice(0,7)

income[today]=(income[today]||0)+total
income[month]=(income[month]||0)+total

rooms[currentRoom]={status:"cleaning"}

save()
loadRooms()
loadIncome()

modal.hide()

}

function cleanDone(){

rooms[currentRoom]={status:"available"}

save()
loadRooms()
modal.hide()

}

function loadIncome(){

let today=new Date().toISOString().slice(0,10)
let month=today.slice(0,7)

document.getElementById("incomeToday").innerText=income[today]||0
document.getElementById("incomeMonth").innerText=income[month]||0

}

loadRooms()
loadIncome()

</script>

</body>
</html>
