<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hotel System Offline</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f5f9;
font-family:system-ui;
}

.header{
background:#111827;
color:white;
padding:14px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.room{
padding:16px;
border-radius:12px;
text-align:center;
color:white;
font-weight:bold;
cursor:pointer;
}

.available{background:#22c55e}
.occupied{background:#ef4444}
.reserved{background:#f59e0b}
.cleaning{background:#6b7280}

.warning{
border:3px solid yellow;
}

</style>

</head>

<body>

<div class="header">🏨 Hotel System Offline</div>

<div class="container mt-3">

<div class="row text-center">

<div class="col">
<h6>ว่าง</h6>
<h4 id="free"></h4>
</div>

<div class="col">
<h6>เข้าพัก</h6>
<h4 id="used"></h4>
</div>

<div class="col">
<h6>จอง</h6>
<h4 id="reservedCount"></h4>
</div>

</div>

<div class="row text-center mt-3">

<div class="col">
<h6>รายได้วันนี้</h6>
<h4 id="incomeToday">0</h4>
</div>

<div class="col">
<h6>รายได้เดือนนี้</h6>
<h4 id="incomeMonth">0</h4>
</div>

</div>

<h5 class="mt-4">Room Map</h5>

<div class="row g-2" id="rooms"></div>

</div>


<div class="modal fade" id="roomModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 id="roomTitle"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input class="form-control mb-2" id="name" placeholder="ชื่อลูกค้า">

<input class="form-control mb-2" id="phone" placeholder="เบอร์โทร">

<input class="form-control mb-2" id="price" value="500" onchange="calcStay()">

<label>วันที่เข้า</label>
<input class="form-control mb-2" type="date" id="checkin" onchange="calcStay()">

<label>วันที่ออก</label>
<input class="form-control mb-2" type="date" id="checkout" onchange="calcStay()">

<div class="alert alert-info text-center" id="stayInfo">
0 คืน | 0 บาท
</div>

<button class="btn btn-success w-100 mb-2" onclick="checkinRoom()">Check-in</button>

<button class="btn btn-warning w-100 mb-2" onclick="reserve()">จอง</button>

<button class="btn btn-danger w-100 mb-2" onclick="checkoutRoom()">Check-out</button>

<button class="btn btn-secondary w-100" onclick="cleanDone()">ทำความสะอาดเสร็จ</button>

</div>

</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || {}
let income = JSON.parse(localStorage.getItem("income")) || {}

let currentRoom=null

let roomModal = new bootstrap.Modal(document.getElementById("roomModal"))

function save(){

localStorage.setItem("rooms",JSON.stringify(rooms))
localStorage.setItem("income",JSON.stringify(income))

}

function loadRooms(){

let html=""
let free=0
let used=0
let reserved=0

for(let i=101;i<=150;i++){

let r=rooms[i]

let className="available"

if(r){

if(r.status=="occupied"){className="occupied";used++}
else if(r.status=="reserved"){className="reserved";reserved++}
else if(r.status=="cleaning"){className="cleaning"}
else free++

}else free++

html+=`
<div class="col-3">
<div class="room ${className}" onclick="openRoom(${i})">
${i}
</div>
</div>
`

}

roomsDiv=document.getElementById("rooms")
roomsDiv.innerHTML=html

freeEl=document.getElementById("free")
usedEl=document.getElementById("used")
reservedEl=document.getElementById("reservedCount")

freeEl.innerText=free
usedEl.innerText=used
reservedEl.innerText=reserved

}

function openRoom(room){

currentRoom=room

document.getElementById("roomTitle").innerText="ห้อง "+room

let r=rooms[room]

if(r){

name.value=r.name||""
phone.value=r.phone||""
price.value=r.price||500
checkin.value=r.checkin||""
checkout.value=r.checkout||""

}else{

name.value=""
phone.value=""
price.value=500

let today=new Date().toISOString().slice(0,10)

checkin.value=today
checkout.value=""

}

calcStay()

roomModal.show()

}

function calcStay(){

let c1=checkin.value
let c2=checkout.value
let priceValue=Number(price.value)

if(c1 && c2){

let nights=(new Date(c2)-new Date(c1))/(1000*60*60*24)

if(nights<=0){
nights=1
}

let total=nights*priceValue

stayInfo.innerText=nights+" คืน | "+total+" บาท

}

}

function checkinRoom(){

if(!checkin.value){

checkin.value=new Date().toISOString().slice(0,10)

}

rooms[currentRoom]={

status:"occupied",
name:name.value,
phone:phone.value,
price:Number(price.value),
checkin:checkin.value,
checkout:checkout.value

}

save()
loadRooms()

roomModal.hide()

}

function reserve(){

rooms[currentRoom]={

status:"reserved",
name:name.value,
phone:phone.value,
price:Number(price.value),
checkin:checkin.value,
checkout:checkout.value

}

save()
loadRooms()

roomModal.hide()

}

function checkoutRoom(){

let r=rooms[currentRoom]

let nights=(new Date(r.checkout)-new Date(r.checkin))/(1000*60*60*24)

if(nights<=0){
nights=1
}

let total=r.price*nights

let today=new Date().toISOString().slice(0,10)
let month=today.slice(0,7)

income[today]=(income[today]||0)+total
income[month]=(income[month]||0)+total

rooms[currentRoom]={status:"cleaning"}

save()
loadRooms()
loadIncome()

roomModal.hide()

}

function cleanDone(){

rooms[currentRoom]={status:"available"}

save()
loadRooms()

roomModal.hide()

}

function loadIncome(){

let today=new Date().toISOString().slice(0,10)
let month=today.slice(0,7)

incomeToday.innerText=income[today]||0
incomeMonth.innerText=income[month]||0

}

loadRooms()
loadIncome()

</script>

</body>
</html>
