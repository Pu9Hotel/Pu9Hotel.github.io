<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการโรงแรมแบบง่าย (ไฟล์เดียว)</title>
    <style>
        body { font-family: Tahoma, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 600px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #eee; }
        .btn { padding: 5px 10px; cursor: pointer; background-color: #28a745; color: white; border: none; }
        .btn:disabled { background-color: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>ระบบจัดการโรงแรม (HTML + JavaScript)</h2>
    
    <table id="roomTable">
        <thead>
            <tr>
                <th>ห้อง</th>
                <th>ประเภท</th>
                <th>สถานะ</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        // 1. จำลองข้อมูลห้องพัก (แทนฐานข้อมูล)
        let rooms = [
            { number: "101", type: "Standard", isAvailable: true },
            { number: "102", type: "Standard", isAvailable: true },
            { number: "201", type: "Deluxe", isAvailable: true }
        ];

        // 2. ฟังก์ชันสำหรับวาดตารางแสดงผล
        function renderTable() {
            let tbody = document.getElementById("tableBody");
            tbody.innerHTML = ""; // ล้างข้อมูลเก่าก่อน
            
            // วนลูปข้อมูลห้องเพื่อสร้างแถวในตาราง
            for (let i = 0; i < rooms.length; i++) {
                let room = rooms[i];
                let statusText = room.isAvailable ? "<span style='color:green;'>ว่าง</span>" : "<span style='color:red;'>มีผู้เข้าพัก</span>";
                let btnHtml = room.isAvailable 
                    ? `<button class="btn" onclick="bookRoom(${i})">จองห้อง</button>`
                    : `<button class="btn" disabled>จองแล้ว</button>`;

                let row = `<tr>
                    <td>${room.number}</td>
                    <td>${room.type}</td>
                    <td>${statusText}</td>
                    <td>${btnHtml}</td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }

        // 3. ฟังก์ชันสำหรับจองห้องพัก
        function bookRoom(index) {
            rooms[index].isAvailable = false; // เปลี่ยนสถานะเป็นไม่ว่าง
            renderTable(); // สั่งให้วาดตารางใหม่เพื่ออัปเดตหน้าจอ
            alert("ทำการจองห้อง " + rooms[index].number + " สำเร็จ!");
        }

        // เรียกใช้งานฟังก์ชันวาดตารางครั้งแรกเมื่อเปิดหน้าเว็บ
        renderTable();
    </script>

</body>
</html>
